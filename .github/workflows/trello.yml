name: Create Trello Card on Push

on:
  push:

jobs:
  create-card:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Trello
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          LIST_ID: ${{ secrets.TRELLO_BACKLOG_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          CLEAN_MSG=$(echo "$COMMIT_MSG" | sed 's/^[^:]*:[[:space:]]*//')
        
          JSON_PAYLOAD=$(jq -n \
            --arg idList "$LIST_ID" \
            --arg name "$CLEAN_MSG" \
            --arg desc "Автор: **$COMMIT_AUTHOR**\n\n[Переглянути зміни на GitHub]($COMMIT_URL)" \
            '{idList: $idList, name: $name, desc: $desc}')

          curl --request POST \
            --url "https://api.trello.com/1/cards?key=$TRELLO_KEY&token=$TRELLO_TOKEN" \
            --header 'Accept: application/json' \
            --header 'Content-Type: application/json' \
            --data "$JSON_PAYLOAD"